<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — UJINN.RVN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: var(--white);
    padding: 60px 48px;
    border: 1px solid var(--warm-gray);
    width: 100%;
    max-width: 440px;
    text-align: center;
  }
  .login-title {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 300;
    margin-bottom: 32px;
    color: var(--black);
    line-height: 1.2;
  }
  .form-group { margin-bottom: 24px; text-align: left; }
  .form-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; color: var(--mid-gray); margin-bottom: 8px; display: block; }
  .form-input { width: 100%; padding: 14px; border: 1px solid var(--warm-gray); background: transparent; font-family: var(--sans); outline: none; border-radius: 0; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--black); }

  .login-btn { width: 100%; background: var(--black); color: var(--white); border: none; padding: 16px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 12px; }
  .login-btn:hover { background: var(--accent); }

  .back-to-site { margin-top: 32px; display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid-gray); text-decoration: none; border-bottom: 1px solid transparent; width: fit-content; margin-left: auto; margin-right: auto; transition: 0.2s; }
  .back-to-site:hover { color: var(--black); border-bottom-color: var(--black); }
</style>
</head>
<body>

<div class="login-card">
  <h1 class="login-title">UJINN.RVN<br><small style="font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); font-weight: 500;">Admin Portal</small></h1>
  
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Admin Email</label>
      <input type="email" id="email" class="form-input" placeholder="admin@ujinn.rvn" value="admin@ujinn.rvn" required>
    </div>
    <div class="form-group">
      <label class="form-label">Security Key</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" value="admin123" required>
    </div>
    <button type="submit" class="login-btn">Enter Workspace</button>
  </form>

  <a href="../index.html" class="back-to-site">Return to Storefront</a>
</div>

<script type="module" src="assets/js/login-firebase.js"></script>
</body>
</html>
