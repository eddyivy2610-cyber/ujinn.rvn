<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Editor — UJINN.RVN Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
  /* Page Specific Form Styles */
  .editor-card { background: var(--white); border: 1px solid var(--warm-gray); padding: 48px; display: flex; flex-direction: column; gap: 40px; }
  .section-title { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--black); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--warm-gray); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .form-group { display: flex; flex-direction: column; gap: 10px; }
  .full-width { grid-column: span 2; }
  .form-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; color: var(--mid-gray); }
  .form-input, .form-select, .form-textarea { padding: 14px 18px; border: 1px solid var(--warm-gray); background: var(--white); font-family: var(--sans); font-size: 14px; outline: none; border-radius: 4px; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--black); }
  .form-textarea { min-height: 120px; resize: vertical; }

  /* Visual Assets */
  .image-upload-wrap { margin-top: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .upload-box { aspect-ratio: 1/1.2; border: 1px dashed var(--warm-gray); background: var(--light-gray); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.3s; overflow: hidden; }
  .upload-box:hover { border-color: var(--accent); background: var(--white); }
  .upload-box svg { width: 24px; height: 24px; stroke: var(--mid-gray); }
  .upload-box img { width: 100%; height: 100%; object-fit: cover; }
  .remove-img { position: absolute; top: 5px; right: 5px; background: var(--accent); color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; opacity: 0; transition: 0.2s; }
  .upload-box:hover .remove-img { opacity: 1; }

  .editor-actions { display: flex; justify-content: flex-end; gap: 20px; margin-top: 48px; }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">
    <a href="dashboard.html">UJINN.RVN<small>Inventory</small></a>
  </div>
  <div class="admin-actions">
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>
</header>

<main class="admin-container">
  <a href="dashboard.html" class="btn-outline" style="margin-bottom: 24px; border: none; padding-left: 0;">← Return to Inventory</a>
  
  <div class="page-header">
    <div class="page-title">
      <h1 id="editorTitle">Add Product</h1>
      <p id="editorSubtitle">Drafting a new masterpiece for the collection.</p>
    </div>
  </div>

  <form class="editor-card" id="editorForm">
    <section>
        <h2 class="section-title">Core Information</h2>
        <div class="form-grid">
            <div class="form-group full-width">
                <label class="form-label">Full Product Name</label>
                <input type="text" id="name" class="form-input" placeholder="e.g. Vintage Silk Kimono" required>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="category" class="form-select" required>
                    <option value="tops">Tops</option>
                    <option value="bottoms">Bottoms</option>
                    <option value="accessories">Accessories</option>
                    <option value="footwear">Footwear</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Price (NGN)</label>
                <input type="number" id="price" class="form-input" placeholder="36000" required>
            </div>
            <div class="form-group">
                <label class="form-label">Total Stock</label>
                <input type="number" id="stock" class="form-input" placeholder="10" required>
            </div>
            <div class="form-group">
                <label class="form-label">Badge Label</label>
                <select id="badge" class="form-select">
                    <option value="">None</option>
                    <option value="new">New Arrival</option>
                    <option value="sale">Sale Item</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label class="form-label">Product Narrative</label>
                <textarea id="desc" class="form-textarea" placeholder="Describe the soul of this piece..."></textarea>
            </div>
        </div>
    </section>

    <section>
        <h2 class="section-title">Visual Assets</h2>
        <p class="form-label">Primary Product Images</p>
        <div class="image-upload-wrap" id="imageGrid">
            <div class="upload-box" onclick="triggerUpload()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                <input type="file" id="fileInput" hidden accept="image/*" multiple onchange="handleFileUpload(event)">
            </div>
        </div>
    </section>

    <div class="editor-actions">
        <a href="dashboard.html" class="btn-outline">Discard Draft</a>
        <button type="submit" class="btn-primary">Protect & Save</button>
    </div>
  </form>
</main>

<script src="../assets/js/admin.js"></script>
<script>
  let editingId = new URLSearchParams(window.location.search).get('id');
  let uploadedImages = [];

  function loadProductData() {
    if (!editingId) return;

    const products = loadInventory();
    const p = products.find(prod => prod.id == editingId);

    if (p) {
        document.getElementById('editorTitle').textContent = 'Refine Piece';
        document.getElementById('editorSubtitle').textContent = `Editing ID: P${String(p.id).padStart(3, '0')}`;
        document.getElementById('name').value = p.name;
        document.getElementById('category').value = p.category;
        document.getElementById('price').value = p.price;
        document.getElementById('stock').value = p.stock;
        document.getElementById('badge').value = p.badge || '';
        document.getElementById('desc').value = p.description || '';
        uploadedImages = p.images || [];
        renderImages();
    }
  }

  function triggerUpload() { document.getElementById('fileInput').click(); }

  function handleFileUpload(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            uploadedImages.push(ev.target.result);
            renderImages();
        };
        reader.readAsDataURL(file);
    });
  }

  function renderImages() {
    const grid = document.getElementById('imageGrid');
    const addBox = grid.querySelector('.upload-box');
    grid.innerHTML = '';
    grid.appendChild(addBox);

    uploadedImages.forEach((src, idx) => {
        const box = document.createElement('div');
        box.className = 'upload-box';
        box.innerHTML = `<img src="${src}"><div class="remove-img" onclick="uploadedImages.splice(${idx}, 1); renderImages();">×</div>`;
        grid.insertBefore(box, addBox);
    });
  }

  document.getElementById('editorForm').onsubmit = function(e) {
    e.preventDefault();
    const products = loadInventory();
    const pData = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        price: parseInt(document.getElementById('price').value),
        stock: parseInt(document.getElementById('stock').value),
        badge: document.getElementById('badge').value,
        description: document.getElementById('desc').value,
        images: uploadedImages,
        icon: 'shirt'
    };

    if (editingId) {
        const idx = products.findIndex(p => p.id == editingId);
        products[idx] = { ...products[idx], ...pData };
    } else {
        const newId = Math.max(...products.map(p => p.id), 0) + 1;
        products.push({ id: newId, ...pData });
    }

    saveInventory(products);
    showToast('Inventory protected.');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  };

  document.addEventListener('DOMContentLoaded', loadProductData);
</script>
</body>
</html>
