<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — UJINN.RVN Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
  /* Page Specific Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
    margin-bottom: 64px;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--warm-gray);
    padding: 32px;
    transition: transform 0.3s;
  }
  .stat-card:hover { transform: translateY(-4px); }
  .stat-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 12px; display: block; }
  .stat-value { font-family: var(--serif); font-size: 44px; font-weight: 300; color: var(--black); }

  /* Inventory Table */
  .inventory-table-wrap { background: var(--white); border: 1px solid var(--warm-gray); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th { background: var(--light-gray); padding: 18px 24px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; color: var(--mid-gray); border-bottom: 1px solid var(--warm-gray); }
  td { padding: 20px 24px; font-size: 13px; border-bottom: 1px solid var(--warm-gray); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .td-product { display: flex; align-items: center; gap: 16px; }
  .td-img { width: 50px; height: 60px; background: var(--light-gray); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .td-img img { width: 100%; height: 100%; object-fit: cover; }
  .td-img svg { width: 60%; height: 60%; opacity: 0.3; }
  .name-wrap strong { display: block; font-size: 14px; color: var(--black); margin-bottom: 2px; }
  .name-wrap span { font-size: 11px; color: var(--mid-gray); text-transform: uppercase; letter-spacing: 0.05em; }
  .price-tag { color: var(--accent); font-weight: 500; }
  .stock-count { display: inline-flex; align-items: center; gap: 8px; }
  .stock-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  .stock-dot.low { background: var(--error); }
  .action-links { display: flex; gap: 16px; }
  .action-links a { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid-gray); text-decoration: none; transition: 0.2s; }
  .action-links a:hover { color: var(--black); }
  .action-links .link-delete { color: var(--error); }

  /* Pagination */
  .pagination-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--warm-gray);
  }
  .pagination-info {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid-gray);
    font-weight: 500;
  }
  .pagination-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .page-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--warm-gray);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    cursor: pointer;
    transition: 0.2s;
    font-family: var(--sans);
    color: var(--text);
  }
  .page-btn:hover { border-color: var(--black); }
  .page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
  .page-btn.nav-page { width: auto; padding: 0 16px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; font-size: 10px; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 768px) {
    .pagination-wrap { flex-direction: column; gap: 20px; text-align: center; }
  }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">
    <a href="dashboard.html">UJINN.RVN<small>Inventory</small></a>
  </div>
  <div class="admin-actions">
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>
</header>

<main class="admin-container">
  <div class="page-header">
    <div class="page-title">
      <h1>Inventory Control</h1>
      <p>Managing the UJINN.RVN collection.</p>
    </div>
    <a href="product-edit.html" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add New Item
    </a>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-label">Total Stock</span>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <span class="stat-label">Stock Value</span>
      <div class="stat-value" id="statValue">₦0</div>
    </div>
    <div class="stat-card">
      <span class="stat-label">Low Items</span>
      <div class="stat-value" id="statLow">0</div>
    </div>
    <div class="stat-card">
      <span class="stat-label">Categories</span>
      <div class="stat-value">4</div>
    </div>
  </div>

  <div class="inventory-table-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-expand"></th>
          <th>Product</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="inventoryBody"></tbody>
    </table>
  </div>

  <div class="pagination-wrap" id="pagination">
    <div class="pagination-info" id="paginationInfo">Showing 1-10 of 24 pieces</div>
    <div class="pagination-controls" id="paginationControls">
      <!-- Buttons injected by JS -->
    </div>
  </div>
</main>

<script src="../assets/js/admin.js"></script>
<script>
  let currentPage = 1;
  const itemsPerPage = 10;

  function renderDashboard(page = 1) {
    currentPage = page;
    const products = loadInventory();
    const body = document.getElementById('inventoryBody');
    const statTotal = document.getElementById('statTotal');
    const statValue = document.getElementById('statValue');
    const statLow = document.getElementById('statLow');

    if (!products.length) {
      body.innerHTML = '<tr><td colspan="6" style="padding: 80px; text-align: center; color: var(--mid-gray);">No items in inventory.</td></tr>';
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    document.getElementById('pagination').style.display = 'flex';

    // Stats calculation (on all products)
    let totalVal = 0;
    let lowCount = 0;
    products.forEach(p => {
        totalVal += (p.price * p.stock);
        if (p.stock < 5) lowCount++;
    });

    statTotal.textContent = products.length;
    statLow.textContent = lowCount;
    statValue.textContent = '₦' + (totalVal / 1000000).toFixed(1) + 'M';

    // Pagination Slicing
    const start = (page - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pagedProducts = products.slice(start, end);

    body.innerHTML = pagedProducts.map(p => {
      return `
        <tr>
          <td data-label="Expand" class="mobile-expand">
            <div class="expand-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </td>
          <td data-label="Product">
            <div class="td-product">
              <div class="td-img">${p.images && p.images[0] ? `<img src="${p.images[0]}">` : adminIcons[p.icon] || adminIcons.shirt}</div>
              <div class="name-wrap">
                <strong>${p.name}</strong>
                <span>ID: P${String(p.id).padStart(3, '0')}</span>
              </div>
            </div>
          </td>
          <td data-label="Price"><span class="price-tag">₦${p.price.toLocaleString()}</span></td>
          <td data-label="Stock">
            <div class="stock-count">
              <span class="stock-dot ${p.stock < 5 ? 'low' : ''}"></span>
              ${p.stock} Units
            </div>
          </td>
          <td data-label="Category">${p.category}</td>
          <td data-label="Action">
            <div class="action-links">
              <a href="product-edit.html?id=${p.id}" class="link-edit">Edit Item</a>
              <a href="#" class="link-delete" onclick="deleteItem(${p.id})">Delete</a>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    renderPaginationControls(products.length, page);
  }

  function renderPaginationControls(total, page) {
    const totalPages = Math.ceil(total / itemsPerPage);
    const start = (page - 1) * itemsPerPage + 1;
    const end = Math.min(page * itemsPerPage, total);
    
    document.getElementById('paginationInfo').textContent = `Showing ${start}-${end} of ${total} pieces`;
    
    let controls = `
      <button class="page-btn nav-page" ${page === 1 ? 'disabled' : ''} onclick="renderDashboard(${page - 1})">Prev</button>
    `;
    
    for (let i = 1; i <= totalPages; i++) {
        controls += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="renderDashboard(${i})">${i}</button>`;
    }
    
    controls += `
      <button class="page-btn nav-page" ${page === totalPages ? 'disabled' : ''} onclick="renderDashboard(${page + 1})">Next</button>
    `;
    
    document.getElementById('paginationControls').innerHTML = controls;
  }

  function deleteItem(id) {
    if (confirm('Permanently delete this piece?')) {
      const products = loadInventory();
      saveInventory(products.filter(p => p.id != id));
      renderDashboard(currentPage);
      showToast('Item deleted.');
    }
  }

  function toggleExpand(tr) {
    if (window.innerWidth > 768) return;
    tr.classList.toggle('is-expanded');
  }

  document.getElementById('inventoryBody').addEventListener('click', (e) => {
      const tr = e.target.closest('tr');
      if (tr) toggleExpand(tr);
  });

  document.addEventListener('DOMContentLoaded', () => renderDashboard(1));
</script>
</body>
</html>
