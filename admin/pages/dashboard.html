<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — UJINN•RVN Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
  /* Statistics Section */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 48px; }
  .stat-card { background: var(--white); border: 1px solid var(--warm-gray); padding: 32px; text-align: left; }
  .stat-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mid-gray); font-weight: 600; margin-bottom: 12px; }
  .stat-value { font-family: var(--serif); font-size: 36px; font-weight: 300; color: var(--black); }

  /* Inventory Table Container */
  .inventory-table-wrap { background: var(--white); border: 1px solid var(--warm-gray); overflow: hidden; margin-bottom: 40px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; color: var(--mid-gray); text-align: left; padding: 20px 24px; border-bottom: 1px solid var(--warm-gray); background: var(--light-gray); }
  td { padding: 24px; border-bottom: 1px solid var(--warm-gray); font-size: 14px; vertical-align: middle; transition: background 0.2s; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(232, 228, 222, 0.25); }

  /* Product Details Column */
  .td-product { display: flex; align-items: center; gap: 16px; overflow: hidden; }
  .td-img { width: 50px; height: 60px; background: var(--light-gray); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .td-img img { width: 100%; height: 100%; object-fit: cover; }
  .name-wrap { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
  .name-wrap strong { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--black); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
  .name-wrap span { font-size: 11px; color: var(--mid-gray); }

  /* Price Tag */
  .price-tag { font-family: var(--serif); font-size: 18px; color: var(--black); }

  /* Stock Status */
  .stock-count { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 400; }
  .stock-dot { width: 6px; height: 6px; border-radius: 50%; background: #2d6a4f; }
  .stock-dot.low { background: #b5451b; }

  /* Badges */
  .badge { font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 50px; background: var(--light-gray); border: 1px solid var(--warm-gray); font-weight: 700; color: var(--mid-gray); }
  .badge.new { background: #e8f5e9; color: #2d6a4f; border-color: #c8e6c9; }
  .badge.sale { background: #fff3e0; color: #ef6c00; border-color: #ffe0b2; }

  /* Action Links */
  .action-links { display: flex; gap: 16px; }
  .link-edit, .link-delete { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; font-weight: 600; cursor: pointer; background: none; border: none; padding: 0; font-family: var(--sans); }
  .link-edit { color: var(--black); border-bottom: 1px solid var(--warm-gray); }
  .link-delete { color: var(--mid-gray); }
  .link-edit:hover { border-bottom-color: var(--black); }
  .link-delete:hover { color: var(--accent); }

  /* Pagination */
  .pagination { display: flex; justify-content: space-between; align-items: center; }
  #paginationInfo { font-size: 12px; color: var(--mid-gray); }
  .page-btn { padding: 10px 18px; background: transparent; border: 1px solid var(--warm-gray); font-size: 11px; cursor: pointer; transition: 0.2s; font-family: var(--sans); letter-spacing: 0.05em; }
  .page-btn:hover:not(:disabled) { border-color: var(--black); background: var(--white); }
  .page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-page { text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; padding: 10px 24px; }
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-inner"></div></div>

<header class="admin-header" style="position:sticky;top:0;z-index:100;background:rgba(249,247,244,0.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--warm-gray);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:70px;">
  <div style="display:flex;align-items:center;gap:40px;">
    <div class="admin-logo">
      <a href="dashboard.html">UJINN•RVN<small>Inventory</small></a>
    </div>
    <nav style="display:flex;gap:28px;">
      <a href="dashboard.html" style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--black);text-decoration:none;font-weight:600;border-bottom:1px solid var(--black);padding-bottom:2px;">Inventory</a>
      <a href="subscribers.html" style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid-gray);text-decoration:none;font-weight:500;transition:color 0.2s;" onmouseover="this.style.color='#0d0c0b'" onmouseout="this.style.color='#9a9490'">Subscribers</a>
    </nav>
  </div>
  <div class="admin-actions">
    <button class="logout-btn" onclick="adminLogout()">Logout</button>
  </div>
</header>

<main class="admin-container">
  <div class="page-header">
    <div class="page-title">
      <h1>The Inventory</h1>
      <p id="paginationInfo">Syncing with catalog database...</p>
    </div>
    <a href="product-edit.html" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add New Item
    </a>
  </div>

  <section class="stats-grid">
    <div class="stat-card">
      <p class="stat-label">Total Unique Pieces</p>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <p class="stat-label">Stock Value (Est.)</p>
      <div class="stat-value" id="statValue">₦0.0M</div>
    </div>
    <div class="stat-card">
      <p class="stat-label">Low Inventory Alerts</p>
      <div class="stat-value" id="statLow" style="color: var(--error);">0</div>
    </div>
  </section>

  <section class="inventory-table-wrap">
    <table>
      <thead>
        <tr>
          <th class="th-expand" style="width: 50px;"></th>
          <th style="width: 40%;">Product Detail</th>
          <th>Unit Price</th>
          <th>In-Stock</th>
          <th>Listing State</th>
          <th style="width: 150px;">Operations</th>
        </tr>
      </thead>
      <tbody id="inventoryBody">
        <tr>
          <td colspan="6" style="padding: 100px; text-align: center; color: var(--mid-gray);">Synchronizing inventory...</td>
        </tr>
      </tbody>
    </table>
  </section>

  <nav class="pagination">
    <div id="paginationControls" style="display: flex; gap: 8px;"></div>
  </nav>
</main>

<div class="toast" id="adminToast"></div>

<script type="module" src="../assets/js/dashboard-firebase.js"></script>
</body>
</html>
